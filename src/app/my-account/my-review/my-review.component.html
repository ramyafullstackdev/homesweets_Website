<div class="card-block">
    <h2 class="h1">Your Review</h2>
  </div>
  <hr class="separator" />
  <div class="cart-overview">
    <div class="cart cart-layout">
      <div class="card-columns mr-t-20">
        <!-- <mat-form-field class="ml-2"> 
            <mat-label>Review Type</mat-label>
            <mat-select  [(ngModel)]="reviewType" (ngModelChange)="onReviewTypeChange($event)">
              <mat-option *ngFor="let header of reviewConfig" [value]="header.value">{{header.name}}</mat-option>
            </mat-select>
          </mat-form-field> -->

      </div>
    </div>
  </div>

  <mat-form-field class="ml-2"> 
            <mat-label>Review Type</mat-label>
            <mat-select  [(ngModel)]="reviewType" (ngModelChange)="onReviewTypeChange($event)">
              <mat-option *ngFor="let header of reviewConfig" [value]="header.value">{{header.name}}</mat-option>
            </mat-select>
          </mat-form-field>

  <div class="hs-container mat-elevation-z8 table-container" *ngIf="dataSource.data.length > 0; else noReview">

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

      <ng-container [matColumnDef]="column" *ngFor="let column of selectedTableHeader">
        <th mat-header-cell *matHeaderCellDef>{{ getColumnName(column) }}</th>
        <td mat-cell *matCellDef="let element">
          <ng-container *ngIf="column !== 'imagePath' && column !== 'reviwe' ">
            {{ element[column] }}
          </ng-container>

          <ng-container *ngIf="column === 'reviwe'">
            {{ element[column]?.reviweName || '-' }}
          </ng-container>

          <ng-container *ngIf="column === 'reviweType'">
            {{ element[column]?.reviweType || '-' }}
          </ng-container>

          <ng-container *ngIf="column === 'kitchenName'">
            {{ element.kitchen?.kitchenDetails?.kitchenForm?.kitchenName || '-' }}
          </ng-container>

          <ng-container *ngIf="column === 'imagePath'">
            <img class="list-image-view" [src]="s3URL + element.imagePath" alt="Review Image" />
          </ng-container>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
      <tr mat-row *matRowDef="let row; columns: columnsToDisplay;"></tr>
    </table>

    <mat-paginator
      [length]="totalElements"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 25, 100]"
      (page)="onPageChange($event)">
    </mat-paginator>
  </div>

  <!-- No Data Template -->
  <ng-template #noReview>
    <div class="text-center p-4">
      <p>No Review for you!</p>
    </div>
  </ng-template>
