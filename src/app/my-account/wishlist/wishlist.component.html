<div class="card-block">
    <h2 class="h1">Your Wishlist</h2>
  </div>
  <hr class="separator" />
  <div class="cart-overview">
    <div class="cart cart-layout">
      <div class="card-columns mr-t-20">

      </div>
    </div>
  </div>

  <div class="hs-container mat-elevation-z8 table-container" *ngIf="dataSource.data.length > 0; else noWishlist">

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

      <ng-container [matColumnDef]="column" *ngFor="let column of selectedTableHeader">
        <th mat-header-cell *matHeaderCellDef>{{ getColumnName(column) }}</th>
        <td mat-cell *matCellDef="let element">
          <ng-container *ngIf="column !== 'product.productImagePath' && column !=='action'">
            {{ getCustomColumn(column, element) }}
          </ng-container>

          <ng-container *ngIf="column === 'product.productImagePath'">
            <img class="list-image-view" [src]="s3URL + getCustomColumn(column, element)" alt="Wishlist Image" />
          </ng-container>
          <ng-container *ngIf="column =='action'">
            <button (click)="removebuyItem(element)" mat-icon-button matTooltip="Click to Delete" class="iconbutton" color="primary">
              <mat-icon aria-label="delete">delete</mat-icon>
            </button>
          
          </ng-container>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
      <tr mat-row *matRowDef="let row; columns: columnsToDisplay;"></tr>
    </table>

    <mat-paginator
      [length]="totalElements"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 25, 100]"
      (page)="onPageChange($event)">
    </mat-paginator>
  </div>

  <!-- No Data Template -->
  <ng-template #noWishlist>
    <div class="text-center p-4">
      <p>No Wishlist for you!</p>
    </div>
  </ng-template>
