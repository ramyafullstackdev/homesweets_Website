<h1 mat-dialog-title>Confirmation</h1>
<ng-container>
  <div mat-dialog-content>
    <p>{{ data.message }}</p>
  </div>
  <div mat-dialog-actions>
    <button mat-button (click)="onNoClick()">No</button>
    <button mat-button [mat-dialog-close]="data.yes" cdkFocusInitial>Yes</button>
  </div>
</ng-container>
