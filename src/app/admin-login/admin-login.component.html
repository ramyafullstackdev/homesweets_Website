<div class="admin-login-container">
  <mat-card class="admin-login-card">
    <mat-card-header>
      <mat-card-title class="admin-title">Admin Login</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="adminLoginForm" (ngSubmit)="onSubmit()" class="admin-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput id="username" formControlName="username" required>
          <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" id="password" formControlName="password" required>
          <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="login-button" [disabled]="adminLoginForm.invalid">
          Login
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
