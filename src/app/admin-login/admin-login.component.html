<div class="admin-login-container">
  <mat-card class="admin-login-card">
    <mat-card-header>
      <mat-card-title class="admin-title">Admin Login</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="adminLoginForm" (ngSubmit)="onSubmit()" class="admin-form">

        <div class="error-message" *ngIf="loginError">
          <mat-icon>error_outline</mat-icon>
          <span>Invalid username or password. Please try again.</span>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput id="username" formControlName="username" required autocomplete="username">
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="adminLoginForm.get('username')?.hasError('required')">
            Username is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password" required autocomplete="current-password">
          <mat-icon matSuffix class="toggle-password" (click)="togglePasswordVisibility()">
            {{ showPassword ? 'visibility_off' : 'visibility' }}
          </mat-icon>
          <mat-error *ngIf="adminLoginForm.get('password')?.hasError('required')">
            Password is required
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="login-button" [disabled]="adminLoginForm.invalid">
          Login
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
